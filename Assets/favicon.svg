<svg width="64" height="64" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Little Routine Timer — favicon SVG -->
  <!-- Place this file at: assets/favicon.svg -->
  <defs>
    <linearGradient id="fav-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5BB7B0"/>
      <stop offset="48%" stop-color="#4AA4A0"/>
      <stop offset="100%" stop-color="#596A9A"/>
    </linearGradient>
    <linearGradient id="fav-fc" x1="70" y1="48" x2="130" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF8F7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#fav-bg)"/>
  <!-- Sun/moon accent top-left -->
  <circle cx="35" cy="35" r="10.5" fill="#FFC742" opacity="0.95"/>
  <!-- Crescent top-right -->
  <path d="M170 16 A13 13 0 1 1 157 40 A8.5 8.5 0 1 0 170 16Z" fill="#FFF7EA" opacity="0.9"/>
  <!-- Clock shadow -->
  <circle cx="100" cy="108" r="60" fill="rgba(20,38,60,0.13)"/>
  <!-- Clock face -->
  <circle cx="100" cy="106" r="60" fill="url(#fav-fc)"/>
  <circle cx="100" cy="106" r="60" fill="none" stroke="rgba(91,183,176,0.18)" stroke-width="2.5"/>
  <!-- Clock ticks -->
  <line x1="100" y1="49" x2="100" y2="56" stroke="#1F2D3D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="157" y1="106" x2="150" y2="106" stroke="#1F2D3D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="100" y1="163" x2="100" y2="156" stroke="#1F2D3D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="43" y1="106" x2="50" y2="106" stroke="#1F2D3D" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Clock centre -->
  <circle cx="100" cy="106" r="6.5" fill="#5BB7B0"/>
  <circle cx="100" cy="106" r="3" fill="white"/>
  <!-- Checkmark badge -->
  <circle cx="155" cy="162" r="23" fill="white"/>
  <circle cx="155" cy="162" r="19" fill="#FF9F8A"/>
  <path d="M145 162 L152.5 169.5 L165.5 154" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Green dot accent -->
  <circle cx="43" cy="165" r="10" fill="#8BCB88" opacity="0.6"/>
</svg>
